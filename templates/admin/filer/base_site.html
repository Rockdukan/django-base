{% extends "admin/base.html" %}
{% load i18n static filer_admin_tags %}

{% block extrastyle %}
    {{ block.super }}
    <link rel="stylesheet" type="text/css" href="{% static 'filer/css/admin_filer.css' %}">
    {% icon_css_library %}
    <style>
        /* Хлебные крошки Filer в стиле Grappelli */
        #grp-breadcrumbs .filer-breadcrumbs-wrap { display: flex; flex-wrap: wrap; align-items: center; }
        #grp-breadcrumbs .filer-breadcrumbs-wrap a { margin-right: 0.25em; }
        /* Панель в block content (иконки, вид, поиск, Загрузить) — одна строка. Перебиваем table и breadcrumb-min-width. */
        .filebrowser .navigator-top-nav,
        body.filebrowser.breadcrumb-min-width .navigator-top-nav {
            display: flex !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            gap: 0.5rem;
        }
        .filebrowser .navigator-top-nav .breadcrumbs-container-wrapper,
        body.filebrowser.breadcrumb-min-width .navigator-top-nav .breadcrumbs-container-wrapper {
            display: flex !important;
            flex: 1 !important;
            min-width: 0 !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            width: auto !important;
        }
        .filebrowser .navigator-top-nav .breadcrumbs-container,
        body.filebrowser.breadcrumb-min-width .navigator-top-nav .breadcrumbs-container {
            display: flex !important;
            flex: 1 !important;
            min-width: 0 !important;
        }
        .filebrowser .navigator-top-nav .breadcrumbs-container-inner,
        body.filebrowser.breadcrumb-min-width .navigator-top-nav .breadcrumbs-container-inner {
            display: flex !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            gap: 0.5rem;
            width: auto !important;
            table-layout: auto !important;
        }
        .filebrowser .navigator-top-nav .navigator-breadcrumbs,
        .filebrowser .navigator-top-nav .navigator-breadcrumbs-folder-name-wrapper,
        .filebrowser .navigator-top-nav .navigator-breadcrumbs-name-dropdown-wrapper,
        .filebrowser .navigator-top-nav .empty-filer-header-cell,
        .filebrowser .navigator-top-nav .filter-files-container,
        body.filebrowser.breadcrumb-min-width .navigator-top-nav .filter-files-container {
            display: inline-flex !important;
            flex-shrink: 0;
            vertical-align: middle;
        }
        .filebrowser .navigator-top-nav .filter-files-container {
            margin-left: auto;
        }
        .filebrowser .navigator-top-nav .tools-container,
        body.filebrowser.breadcrumb-min-width .navigator-top-nav .tools-container {
            display: inline-flex !important;
            flex-shrink: 0 !important;
            align-items: center !important;
        }
        .filebrowser .navigator-top-nav .navigator-tools,
        body.filebrowser.breadcrumb-min-width .navigator-top-nav .navigator-tools {
            display: flex !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
        }
        body.filebrowser.breadcrumb-min-width .navigator-top-nav .navigator-button-wrapper {
            margin-top: 0 !important;
        }
        body.filebrowser.breadcrumb-min-width .navigator-top-nav .actions-wrapper {
            margin-top: 0 !important;
        }
        /* Скрыть дублирующую панель object-tools от родительского шаблона (на странице одна панель — в content) */
        .filebrowser .grp-object-tools {
            display: none !important;
        }
        /* Текст кнопок «Новая папка» и «Загрузить файлы» */
        .filebrowser .navigator-top-nav .navigator-button-wrapper .navigator-button,
        .filebrowser .navigator-top-nav .navigator-button-upload {
            color: var(--dca-gray, var(--body-quiet-color, #666)) !important;
        }
    </style>
{% endblock %}

{% block extrahead %}
    {{ block.super }}
    {{ media.js }}
    <script src="{% static 'admin/js/admin/RelatedObjectLookups.js' %}"></script>
    <script src="{% static 'filer/js/dist/filer-base.bundle.js' %}"></script>
{% endblock %}
